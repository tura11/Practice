[[blockchains]]
  chain_id = "1337"
  docker_cmd_params = ["-b", "1", "--mixed-mining", "--slots-in-an-epoch", "1", "--base-fee", "1", "--gas-price", "1", "--balance", "100000"]
  image = "ghcr.io/foundry-rs/foundry:stable"
  port = "8545"
  type = "anvil"

[fake_server]
  image = "chainlink-fakes:latest"
  port = 9111

[[nodesets]]
  name = "don"
  nodes = 1
  override_mode = "each"

  [nodesets.db]
    image = "postgres:15.0"

  [[nodesets.node_specs]]

    [nodesets.node_specs.node]
      image = "chainlink-tmp:latest"
