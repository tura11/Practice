[[products]]
name = "cron"
instances = 1

[[nodesets]]
  name = "don"
  # can be tested with a single CL node
  nodes = 1
  override_mode = "each"

  [nodesets.db]
    image = "postgres:15.0"

  [[nodesets.node_specs]]
    [nodesets.node_specs.node]
      image = "public.ecr.aws/chainlink/chainlink:2.30.0"

[[cron]]
schedule = "CRON_TZ=UTC * * * * * *"
