[jd]
  csa_encryption_key = "d1093c0060d50a3c89c189b2e485da5a3ce57f3dcb38ab7e2c0d5f0bb2314a44" # any random 32 byte hex string
  # change to your version
  image = "job-distributor:0.22.1"

[fake]
  port = 8171

[fake_http]
  port = 8666

#[s3provider]
#  # use all defaults
#  port = 9000
#  console_port = 9001

[infra]
  # either "docker" or "kubernetes"
  type = "docker"

[[nodesets]]
  nodes = 4
  name = "workflow"
  don_types = ["workflow"]
  override_mode = "all"
  http_port_range_start = 10100

  supported_evm_chains = [1337]
  supported_sol_chains = ["22222222222222222222222222222222222222222222"]

  env_vars = { CL_EVM_CMD = "", OTEL_SERVICE_NAME = "chainlink-node" }
  capabilities = ["ocr3", "custom-compute", "web-api-trigger", "cron", "http-action", "http-trigger", "consensus", "don-time"]
  registry_based_launch_allowlist = ["cron-trigger@1.0.0"]

  # See ./examples/workflow-don-overrides.toml to learn how to override capability configs

  [nodesets.db]
    image = "postgres:12.0"
    port = 13000

 [[nodesets.node_specs]]
    roles = ["plugin"]
    [nodesets.node_specs.node]
      docker_ctx = "../../../.."
      docker_file = "core/chainlink.Dockerfile"
      docker_build_args = { "CL_IS_PROD_BUILD" = "false" }
      # image = "chainlink-tmp:latest"
      user_config_overrides = ""

[[nodesets]]
  nodes = 4
  name = "capabilities"
  don_types = ["capabilities"]
  exposes_remote_capabilities = true
  override_mode = "all"
  http_port_range_start = 10200

  # we need to have chain 1337 configured (even if no capability uses it), because we use node addresses on chain 1337
  # to identify nodes in the gateway configuration (required by both web-api-target and vault capabilities)
  supported_evm_chains = [1337]
  supported_sol_chains = ["22222222222222222222222222222222222222222222"]

  env_vars = { CL_EVM_CMD = "", OTEL_SERVICE_NAME = "chainlink-node" }
  capabilities = ["web-api-target", "vault", "solana"]

  [nodesets.db]
    image = "postgres:12.0"
    port = 13100

  [[nodesets.node_specs]]
    roles = ["plugin"]
    [nodesets.node_specs.node]
      docker_ctx = "../../../.."
      docker_file = "core/chainlink.Dockerfile"
      docker_build_args = { "CL_IS_PROD_BUILD" = "false" }
      # image = "chainlink-tmp:latest"
      user_config_overrides = ""

[[nodesets]]
  nodes = 1
  name = "bootstrap-gateway"
  don_types = ["bootstrap", "gateway"]
  override_mode = "each"
  http_port_range_start = 10300

  env_vars = { CL_EVM_CMD = "", OTEL_SERVICE_NAME = "chainlink-node" }
  supported_evm_chains = [1337]

  [nodesets.db]
    image = "postgres:12.0"
    port = 13200

  [[nodesets.node_specs]]
    roles = ["bootstrap", "gateway"]
    [nodesets.node_specs.node]
      docker_ctx = "../../../.."
      docker_file = "core/chainlink.Dockerfile"
      docker_build_args = { "CL_IS_PROD_BUILD" = "false" }
      # image = "chainlink-tmp:latest"
      # 5002 is the web API capabilities port for incoming requests
      # 15002 is the vault port for incoming requests
      custom_ports = ["5002:5002","15002:15002"]
      user_config_overrides = ""
