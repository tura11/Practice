  public_key = "7EcDhSYGxXyscszYEp35KHN8vvw3svAuLKTzXwCFLtV"
  contracts_dir = "../tests/smoke/cre/solana_contracts"
  [blockchains.solana_programs]
    keystone_forwarder = "whV7Q5pi17hPPyaPksToDw1nMx6Lh8qmNWKFaLRQ4wz"
