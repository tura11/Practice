# Workflow DON with gateway and gRPC additional workflow source enabled.
# This topology is the same as workflow-gateway-don.toml but with AdditionalSources
# configured to read workflows from a gRPC source at host.docker.internal:8544.
#
# Used by: system-tests/tests/smoke/cre/v2_grpc_source_test.go

[chip_router]
  image = "local-cre-chip-router:v1.0.1"

[[blockchains]]
  type = "anvil"
  chain_id = "1337"
  container_name = "anvil-1337"
  docker_cmd_params = ["-b", "0.5", "--mixed-mining"]

[[blockchains]]
  type = "anvil"
  chain_id = "2337"
  container_name = "anvil-2337"
  port = "8546"
  docker_cmd_params = ["-b", "0.5", "--mixed-mining"]

[jd]
  csa_encryption_key = "d1093c0060d50a3c89c189b2e485da5a3ce57f3dcb38ab7e2c0d5f0bb2314a44" # any random 32 byte hex string
  # change to your version
  image = "job-distributor:0.22.1"

[fake]
  port = 8171

[fake_http]
  port = 8666

#[s3provider]
#  # use all defaults
#  port = 9000
#  console_port = 9001

[infra]
  # either "docker" or "kubernetes"
  type = "docker"

[[nodesets]]
  nodes = 4
  name = "workflow"
  don_types = ["workflow"]
  override_mode = "all"
  http_port_range_start = 10100

  env_vars = { CL_EVM_CMD = "", OTEL_SERVICE_NAME = "chainlink-node" }
  capabilities = ["ocr3", "custom-compute", "web-api-target", "web-api-trigger", "vault", "cron", "http-action", "http-trigger", "consensus", "don-time", "write-evm-1337", "write-evm-2337", "read-contract-1337", "read-contract-2337", "evm-1337", "evm-2337"]
  registry_based_launch_allowlist = ["cron-trigger@1.0.0"]

  # See ./examples/workflow-don-overrides.toml to learn how to override capability configs

  [nodesets.db]
    image = "postgres:12.0"
    port = 13000

[[nodesets.node_specs]]
    roles = ["plugin"]
    [nodesets.node_specs.node]
      docker_ctx = "../../../.."
      docker_file = "core/chainlink.Dockerfile"
      docker_build_args = { "CL_IS_PROD_BUILD" = "false" }
      # image = "chainlink-tmp:latest"
      user_config_overrides = """
# Configure gRPC additional workflow source
# The mock server runs on port 8544 (started by the test before environment setup)
[[Capabilities.WorkflowRegistry.AdditionalSources]]
URL = 'host.docker.internal:8544'
TLSEnabled = false
Name = 'mock-private-registry'
"""

[[nodesets]]
  nodes = 1
  name = "bootstrap-gateway"
  don_types = ["bootstrap", "gateway"]
  override_mode = "each"
  http_port_range_start = 10300

  env_vars = { CL_EVM_CMD = "", OTEL_SERVICE_NAME = "chainlink-node" }
  supported_evm_chains = [1337, 2337]

  [nodesets.db]
    image = "postgres:12.0"
    port = 13200

  [[nodesets.node_specs]]
    roles = ["bootstrap", "gateway"]
    [nodesets.node_specs.node]
      docker_ctx = "../../../.."
      docker_file = "core/chainlink.Dockerfile"
      docker_build_args = { "CL_IS_PROD_BUILD" = "false" }
      # 5002 is the web API capabilities port for incoming requests
      # 15002 is the vault port for incoming requests
      custom_ports = ["5002:5002","15002:15002"]
      # image = "chainlink-tmp:latest"
      user_config_overrides = ""
