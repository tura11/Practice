name: CRE Regression System Tests

on:
  workflow_dispatch:
    inputs:
      chainlink_image_repository_path:
        description: "ECR repository name used to compose image with chainlink_image_tag
          (for example: chainlink-integration-tests or chainlink or
          chainlink/chainlink)."
        required: true
        type: string
      chainlink_image_tag:
        required: true
        type: string
        description: "Chainlink image tag to use."
      ecr:
        required: true
        type: choice
        options:
          - "sdlc"
          - "public"
        default: "sdlc"
        description: "Whether to use the SDLC or public ECR registry for the Chainlink
          image."
      chainlink_version:
        required: false
        type: string
        description: "The version of Chainlink repository to use for the tests. If
          empty, defaults to github.sha."
        default: ""
  workflow_call:
    inputs:
      chainlink_image_repository_path:
        description: "ECR repository name used to compose image with chainlink_image_tag
          (for example: chainlink-integration-tests or chainlink or
          chainlink/chainlink)."
        required: true
        type: string
      chainlink_image_tag:
        required: true
        type: string
        description: "Chainlink image tag to use."
      ecr:
        type: string
        required: true
        description: "Whether to use the SDLC (sdlc) or public ECR registry (public) for
          the Chainlink image."
      chainlink_version:
        required: false
        type: string
        description: "The version of Chainlink repository to use for the tests. If
          empty, defaults to github.sha."
        default: ""

jobs:
  define-test-matrix:
    runs-on: runs-on=${{ github.run_id
      }}/cpu=8/ram=32/family=m6i+m5.*/spot=false/image=ubuntu24-full-x64/extras=s3-cache+tmpfs
    outputs:
      matrix: ${{ steps.define-matrix.outputs.matrix }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.chainlink_version || github.sha }}
          persist-credentials: false

      - name: Enable S3 Cache for Self-Hosted Runners
        uses: runs-on/action@742bf56072eb4845a0f94b3394673e4903c90ff0 # v2.1.0
        with:
          metrics: cpu,network,memory,disk

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: system-tests/tests/go.mod
          cache: true

      - name: Define test matrix
        id: define-matrix
        shell: bash
        working-directory: system-tests/tests
        run: |
          test_names=$(go test \
          github.com/smartcontractkit/chainlink/system-tests/tests/regression/cre \
           -list . | grep -v 'ok' | grep -v '^$')

          # generate IDs for each test
          tests=$(echo "$test_names" | jq -R -s '
            split("\n") | map(select(length>0))
            | to_entries
            | map({
                test_name: .value,
                test_id: .key,
                cre_version: (if (.value | test("V1")) then "v1" else "v2" end)
              })
          ')

          tests=$(echo "$tests" | jq -c .)
          echo "matrix=$tests" | tee -a "${GITHUB_OUTPUT}"

  run-system-tests:
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        tests: ${{fromJson(needs.define-test-matrix.outputs.matrix)}}
    needs: [ define-test-matrix ]
    # we need a `test_id` and `run_attempt` here to stop runner stealing
    # see: https://runs-on.com/guides/troubleshoot/#runner-stealing-and-matrix-jobs
    runs-on: runs-on=${{ github.run_id }}-${{ matrix.tests.test_id }}-${{
      github.run_attempt
      }}/cpu=16/ram=64/family=m6i+m5.*/spot=false/image=ubuntu24-full-x64/extras=s3-cache+tmpfs
    environment:
      # http://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/control-deployments#using-environments-without-deployments
      name: integration
      deployment: false
    timeout-minutes: 10
    env:
      ENABLE_AUTO_QUARANTINE: "true"
      # override Chip Ingress and Chip Config images with remote images. We have added this env var here, instead of the "Start local CRE" step, because
      # Beholder stack will be started only for the Beholder tests
      CTF_CHIP_INGRESS_IMAGE: ${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.${{
        secrets.QA_AWS_REGION
        }}.amazonaws.com/atlas-chip-ingress:da84cb72d3a160e02896247d46ab4b9806ebee2f
      CTF_CHIP_CONFIG_IMAGE: ${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.${{
        secrets.QA_AWS_REGION
        }}.amazonaws.com/atlas-chip-config:7b4e9ee68fd1c737dd3480b5a3ced0188f29b969
      CTF_CHIP_ROUTER_IMAGE: "${{ secrets.QA_AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{
        secrets.QA_AWS_REGION }}.amazonaws.com/local-cre-chip-router:v1.0.1"
      BILLING_PLATFORM_SERVICE_IMAGE: ${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.${{
        secrets.QA_AWS_REGION }}.amazonaws.com/billing-platform-service:v1.45.0

    steps:
      - name: Enable S3 Cache for Self-Hosted Runners
        uses: runs-on/action@742bf56072eb4845a0f94b3394673e4903c90ff0 # v2.1.0
        with:
          metrics: cpu,network,memory,disk

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.chainlink_version || github.sha }}
          persist-credentials: false

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: system-tests/tests/go.mod
          cache: true

      # Required to pull private ECR images such as Job Distributor (main) and Chip Ingress (main),
      # and also the Chainlink image when inputs.ecr is "sdlc".
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a # v4.0.1
        with:
          aws-region: ${{ secrets.QA_AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_CTF_READ_ACCESS_ROLE_ARN }}
          role-duration-seconds: 1800
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2.1.1
        with:
          registries: ${{ format('{0},{1}', secrets.QA_AWS_ACCOUNT_NUMBER,
            secrets.AWS_ACCOUNT_ID_PROD) }}
        env:
          AWS_REGION: ${{ secrets.QA_AWS_REGION }}

      # Required to allow pulling public images
      - name: Authenticate to ECR (public)
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2.1.1
        with:
          registry-type: public
        env:
          AWS_REGION: us-east-1

      - name: Set up gotestsum
        shell: bash
        run: |
          echo "::startgroup::Install gotestsum"
          go install gotest.tools/gotestsum@v1.12.3
          echo "::endgroup::"

      - name: Resolve Chainlink image
        id: resolve-chainlink-image
        working-directory: .github/scripts
        shell: bash
        env:
          ECR_TYPE: ${{ inputs.ecr }}
          CHAINLINK_IMAGE_REPO_PATH: ${{ inputs.chainlink_image_repository_path }}
          CHAINLINK_IMAGE_TAG: ${{ inputs.chainlink_image_tag }}
          AWS_ACCOUNT_NUMBER: ${{ secrets.QA_AWS_ACCOUNT_NUMBER }}
          AWS_REGION: ${{ secrets.QA_AWS_REGION }}
        run: |
          resolved_image="$(bash resolve-chainlink-image.sh)"
          echo "$resolved_image"
          echo "resolved_image=${resolved_image}" >> "${GITHUB_OUTPUT}"

      - name: Start local CRE${{ matrix.tests.cre_version }}
        shell: bash
        id: start-local-cre
        env:
          CTF_JD_IMAGE: "${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.${{
            secrets.QA_AWS_REGION }}.amazonaws.com/job-distributor:0.22.1"
          CTF_CHAINLINK_IMAGE: "${{ steps.resolve-chainlink-image.outputs.resolved_image }}"
          CTF_CONFIGS: configs/workflow-gateway-capabilities-don.toml
          CRE_VERSION: ${{ matrix.tests.cre_version }}
          TEST_NAME: ${{ matrix.tests.test_name }}
        run: |
          cd core/scripts/cre/environment

          # Start CRE with the appropriate contracts version (i.e. Workflow/CapabilityRegistry)
          if [[ "${CRE_VERSION}" == "v1" ]]; then
            echo "Starting CRE with explicit v1 contracts for test: '${TEST_NAME}' and configs: '${CTF_CONFIGS}'"
            go run . env start --with-contracts-version v1
          else
            echo "Starting CRE with default v2 contracts for test: '${TEST_NAME}' and configs: '${CTF_CONFIGS}'"
            go run . env start
          fi

          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "Error: failed to start local CRE ${CRE_VERSION}, exit code $exit_code"
            exit $exit_code
          fi

      - name: Run CRE${{ matrix.tests.cre_version }} Regression system tests
        id: run-regression-tests
        shell: bash
        working-directory: system-tests/tests
        continue-on-error: ${{ env.ENABLE_AUTO_QUARANTINE == 'true' }}
        env:
          TEST_NAME: ${{ matrix.tests.test_name }}
          TEST_TIMEOUT: 7m # let's leave 3 minutes for other steps (the whole job times out after 10 minutes)
          PARALLEL_COUNT: "10"
          CRE_TEST_PARALLEL_ENABLED: "true"
        run: |
          echo "Starting test: '${TEST_NAME}'"
          echo "⚠️⚠️⚠️ Add 'skip-e2e-regression' label to skip this step if necessary ⚠️⚠️⚠️"

          gotestsum \
            --jsonfile=/tmp/gotest-regression.log \
            --junitfile=/tmp/junit-report-regression.xml \
            --format=github-actions \
            -- \
            -v -run "^(${TEST_NAME})$" -timeout "${TEST_TIMEOUT}" -count=1 -parallel="${PARALLEL_COUNT}" \
            github.com/smartcontractkit/chainlink/system-tests/tests/regression/cre

          exit_code=$?
          if [ "$exit_code" -eq 0 ]; then
            echo "tests_result=✅ Tests passed" >> $GITHUB_OUTPUT
          fi

          echo "⚠️⚠️⚠️ Add 'skip-e2e-regression' label to skip this step if necessary ⚠️⚠️⚠️"

          exit "$exit_code"

      - name: Analyze and upload test results (${{
          steps.run-regression-tests.outputs.tests_result }})
        if: ${{ !cancelled() }}
        uses: smartcontractkit/.github/actions/branch-out-upload@branch-out-upload/v1
        with:
          junit-file-path: "/tmp/junit-report-regression.xml"
          trunk-org-slug: chainlink
          trunk-token: ${{ secrets.TRUNK_API_KEY }}
          trunk-previous-step-outcome: ${{ steps.run-regression-tests.outcome }}
          # when auto-quarantine is enabled, allow this to determine test failures
          trunk-upload-only: ${{ env.ENABLE_AUTO_QUARANTINE != 'true' }}
          # unique name per matrix job to avoid 409 conflict when multiple jobs upload in the same workflow run
          artifact-name: ${{ matrix.tests.test_id }}_test_logs

      - name: Show Docker containers status
        if: failure() || cancelled()
        shell: bash
        run: docker ps -a

      - name: Save Regression tests Docker logs
        if: failure() || cancelled()
        shell: bash
        working-directory: system-tests/tests/regression/cre
        run: |
          mkdir -p logs
          for c in $(docker ps -a --format '{{.Names}}'); do
            docker logs "$c" > "logs/${c}.log" 2>&1
          done

      - name: Upload all artifacts as single package
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-${{ matrix.tests.test_name }}-${{ matrix.tests.topology }}
          path: |
            ./system-tests/tests/regression/cre/logs/
            /tmp/gotest.log
            /tmp/gotest-regression.log
            /tmp/junit-report.xml
