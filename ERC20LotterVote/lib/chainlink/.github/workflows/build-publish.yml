name: "Build, Sign and Publish Chainlink"

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  checks:
    name: "Checks"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      is-release: ${{ steps.release-tag-check.outputs.is-release }}
      is-pre-release: ${{ steps.release-tag-check.outputs.is-pre-release }}
      ccip-image-tag: ${{ steps.compute-ccip-tag.outputs.ccip-image-tag }}
      prerelease-phase: ${{ steps.detect-prerelease-phase.outputs.prerelease-phase }}
      is-hotfix: ${{ steps.detect-hotfix.outputs.is-hotfix }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check release tag
        id: release-tag-check
        uses: smartcontractkit/.github/actions/release-tag-check@c5c4a8186da4218cff6cac8184e47dd3dec69ba3 # release-tag-check@0.1.0

      - name: Compute CCIP image tag
        id: compute-ccip-tag
        shell: bash
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          # Compute CCIP-specific image tag by inserting '-ccip' before pre-release identifier
          # Examples:
          #   v2.34.0-rc.1   -> 2.34.0-ccip-rc.1
          #   v2.34.0-beta.0 -> 2.34.0-ccip-beta.0
          tag_without_v="${GIT_TAG#v}"
          ccip_tag=$(echo "$tag_without_v" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-(.*)$/\1-ccip-\2/')
          echo "ccip-image-tag=$ccip_tag" | tee -a "$GITHUB_OUTPUT"

      - name: Detect prerelease phase
        id: detect-prerelease-phase
        if: ${{ steps.release-tag-check.outputs.is-pre-release == 'true' &&
          (contains(github.ref_name, '-beta.') || contains(github.ref_name,
          '-rc.')) }}
        shell: bash
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          phase=""

          if [[ "$GIT_TAG" =~ -beta\.[0-9]+$ ]]; then
            phase="beta"
          elif [[ "$GIT_TAG" =~ -rc\.[0-9]+$ ]]; then
            # Release candidates.
            phase="rc"
          else
            echo "::error::Unable to determine prerelease phase from tag: $GIT_TAG"
            exit 1
          fi
          echo "prerelease-phase=$phase" | tee -a "$GITHUB_OUTPUT"

      - name: Detect hotfix release
        id: detect-hotfix
        shell: bash
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          # Extract patch version from tag (e.g., v2.33.1-beta.0 -> 1)
          # Hotfix releases have non-zero patch versions
          if [[ "$GIT_TAG" =~ ^v[0-9]+\.[0-9]+\.([0-9]+) ]]; then
            patch_version="${BASH_REMATCH[1]}"
            if [[ "$patch_version" -gt 0 ]]; then
              echo "is-hotfix=true" | tee -a "$GITHUB_OUTPUT"
            else
              echo "is-hotfix=false" | tee -a "$GITHUB_OUTPUT"
            fi
          else
            echo "is-hotfix=false" | tee -a "$GITHUB_OUTPUT"
            echo "Unable to extract patch version, assuming not a hotfix"
          fi

      - name: Check for VERSION file bump on tags
        if: ${{ github.repository == 'smartcontractkit/chainlink' }}
        uses: ./.github/actions/version-file-bump
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  docker-core:
    needs: [ checks ]
    # No need to build the final image as we promote the last RC to use the final tag
    # so we only run the builds for pre-releases.
    if: needs.checks.outputs.is-pre-release == 'true'
    permissions:
      contents: read
      id-token: write
    uses: smartcontractkit/.github/.github/workflows/reusable-docker-build-publish.yml@f7223bc10928ba2ac7028fe3fae1d435b3bbbf6a # reusable-docker-build-publish/1.2.0
    with:
      aws-ecr-name: chainlink
      aws-region-ecr: us-east-1
      aws-region-gati: us-west-2
      dockerfile: core/chainlink.Dockerfile
      docker-build-context: .
      docker-build-args: |
        CHAINLINK_USER=chainlink
        COMMIT_SHA=${{ github.sha }}
        VERSION_TAG=${{ github.ref_name }}
        CL_GOPRIVATE=${{ github.repository != 'smartcontractkit/chainlink' && 'github.com/smartcontractkit/*' || '' }}
      docker-cache-behaviour: "disable"
      docker-manifest-sign: true
      docker-registry-url-override: public.ecr.aws/chainlink
      github-runner-arm64: ${{ github.repository != 'smartcontractkit/chainlink' && 'ubuntu-24.04-4cores-16GB-ARM' || 'ubuntu-24.04-arm' }}
      docker-image-tag-strip-prefix: v # strip out the "v" prefix from the git tag for the image tag.
      git-sha: ${{ github.sha }}
      github-event-name: ${{ github.event_name }}
      github-ref-name: ${{ github.ref_name }}
      github-ref-type: ${{ github.ref_type}}
      github-workflow-repository: ${{ github.repository }}
      allow-overwrites: "false"
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID_SDLC }}
      AWS_ROLE_PUBLISH_ARN: ${{ secrets.AWS_OIDC_IAM_ROLE_SDLC_BUILD_PUBLISH_ARN }}
      AWS_ROLE_GATI_ARN: ${{ secrets.AWS_OIDC_CHAINLINK_READ_ONLY_TOKEN_ISSUER_ROLE_ARN }}
      AWS_LAMBDA_GATI_URL: ${{ secrets.AWS_INFRA_RELENG_TOKEN_ISSUER_LAMBDA_URL }}

  docker-ccip:
    needs: [ checks ]
    # No need to build the final image as we promote the last RC to use the final tag
    # so we only run the builds for pre-releases.
    if: needs.checks.outputs.is-pre-release == 'true'
    permissions:
      contents: read
      id-token: write
    uses: smartcontractkit/.github/.github/workflows/reusable-docker-build-publish.yml@f7223bc10928ba2ac7028fe3fae1d435b3bbbf6a # reusable-docker-build-publish/1.2.0
    with:
      aws-ecr-name: ccip
      aws-region-ecr: us-east-1
      aws-region-gati: us-west-2
      dockerfile: core/chainlink.Dockerfile
      docker-build-context: .
      docker-build-args: |
        CHAINLINK_USER=chainlink
        COMMIT_SHA=${{ github.sha }}
        VERSION_TAG=${{ github.ref_name }}
        CL_INSTALL_PRIVATE_PLUGINS=true
        CL_CHAIN_DEFAULTS=/ccip-config
        CL_SOLANA_CMD=
        CL_GOPRIVATE=${{ github.repository != 'smartcontractkit/chainlink' && 'github.com/smartcontractkit/*' || '' }}
      docker-cache-behaviour: "disable"
      docker-manifest-sign: true
      docker-registry-url-override: public.ecr.aws/chainlink
      github-runner-arm64: ${{ github.repository != 'smartcontractkit/chainlink' && 'ubuntu-24.04-4cores-16GB-ARM' || 'ubuntu-24.04-arm' }}
      docker-image-tag-override: ${{ needs.checks.outputs.ccip-image-tag }}
      git-sha: ${{ github.sha }}
      github-event-name: ${{ github.event_name }}
      github-ref-name: ${{ github.ref_name }}
      github-ref-type: ${{ github.ref_type}}
      github-workflow-repository: ${{ github.repository }}
      allow-overwrites: "false"
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID_SDLC }}
      AWS_ROLE_PUBLISH_ARN: ${{ secrets.AWS_OIDC_IAM_ROLE_SDLC_BUILD_PUBLISH_ARN }}
      AWS_ROLE_GATI_ARN: ${{ secrets.AWS_OIDC_CHAINLINK_READ_ONLY_TOKEN_ISSUER_ROLE_ARN }}
      AWS_LAMBDA_GATI_URL: ${{ secrets.AWS_INFRA_RELENG_TOKEN_ISSUER_LAMBDA_URL }}

  deploy:
    name: "Deploy"
    needs: [ checks, docker-ccip ]
    # We are only deploying CCIP pre-releases and skipping hotfix deployments for now.
    if: needs.checks.outputs.is-pre-release == 'true' &&
      needs.checks.outputs.is-hotfix == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Deploy CCIP Beta
        if: needs.checks.outputs.prerelease-phase == 'beta'
        uses: ./.github/actions/deploy-image
        with:
          aws-role-arn: ${{ secrets.AWS_RELENG_PROD_GATI_WORKFLOW_INVOKE_ARN }}
          aws-lambda-url: ${{ secrets.AWS_INFRA_RELENG_TOKEN_ISSUER_LAMBDA_URL }}
          aws-region: ${{ secrets.AWS_REGION }}
          repo-destination: ${{ secrets.REPO_K8S_DEPLOY }}
          oci-image-tag: ${{ needs.docker-ccip.outputs.docker-manifest-tag }}
          oci-repository-url: public.ecr.aws/chainlink/ccip
          pr-close-enabled: false
          pr-labels: preview-stage,force-preview
          products: |
            ccip-prereleases-staging

      - name: Deploy CCIP RC
        if: needs.checks.outputs.prerelease-phase == 'rc'
        uses: ./.github/actions/deploy-image
        with:
          aws-role-arn: ${{ secrets.AWS_RELENG_PROD_GATI_WORKFLOW_INVOKE_ARN }}
          aws-lambda-url: ${{ secrets.AWS_INFRA_RELENG_TOKEN_ISSUER_LAMBDA_URL }}
          aws-region: ${{ secrets.AWS_REGION }}
          repo-destination: ${{ secrets.REPO_K8S_DEPLOY }}
          oci-image-tag: ${{ needs.docker-ccip.outputs.docker-manifest-tag }}
          oci-repository-url: public.ecr.aws/chainlink/ccip
          pr-close-enabled: false
          pr-labels: preview-stage,force-preview
          products: |
            ccip-prereleases-prod-testnet

  # Notify Slack channel for new git tags associated with pre-releases.
  # Final release notifications originate from the release coordinator repo.
  slack-notify:
    permissions:
      contents: read
    if: always() && (needs.docker-core.result == 'success' ||
      needs.docker-ccip.result == 'success')
    needs: [ checks, docker-core, docker-ccip ]
    uses: ./.github/workflows/release-notifications.yml
    secrets: inherit
    with:
      git-ref: ${{ github.ref_name }}
      git-ref-type: ${{ github.ref_type }}
      changelog-url: >-
        ${{
          format(
            'https://github.com/{0}/blob/{1}/CHANGELOG.md',
            github.repository,
            github.ref_name
          )
        }}
      docker-image-names: |
        ${{ needs.docker-core.result == 'success' && format('public.ecr.aws/chainlink/chainlink:{0}|{1}', needs.docker-core.outputs.docker-manifest-tag, needs.docker-core.outputs.docker-manifest-digest) || '' }}
        ${{ needs.docker-ccip.result == 'success' && format('public.ecr.aws/chainlink/ccip:{0}|{1}', needs.docker-ccip.outputs.docker-manifest-tag, needs.docker-ccip.outputs.docker-manifest-digest) || '' }}

  emit-pre-release-image-published-event:
    name: Emit pre-release image published event
    needs: [ docker-core, slack-notify ]
    if: |
      always() &&
      needs.docker-core.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Emit pre-release image published event
        env:
          DOCKER_MANIFEST_TAG: ${{ needs.docker-core.outputs.docker-manifest-tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
          SLACK_THREAD_TS: ${{ needs.slack-notify.outputs.slack-thread-ts }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/dispatches" \
            --input - <<JSON
          {
            "event_type": "pre-release-image-published",
            "client_payload": {
              "chainlink_image_tag": "${DOCKER_MANIFEST_TAG}",
              "chainlink_version": "${GITHUB_REF_NAME}",
              "slack_thread_ts": "${SLACK_THREAD_TS}"
            }
          }
          JSON
